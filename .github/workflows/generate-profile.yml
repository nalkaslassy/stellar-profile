name: Generate stellar-profile

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'generator/**'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write config if secret is set
        if: ${{ secrets.STELLAR_CONFIG != '' }}
        env:
          STELLAR_CONFIG: ${{ secrets.STELLAR_CONFIG }}
        run: echo "$STELLAR_CONFIG" > config.yml

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_CONFIG: ${{ secrets.STELLAR_CONFIG != '' }}
        run: |
          if [ -f config.yml ]; then
            echo "Config found — generating with real data"
            python -m generator.main
          else
            echo "No config — running in demo mode"
            python -m generator.main --demo
          fi

      - name: Commit and push assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/
          git diff --staged --quiet || git commit -m "chore: regenerate profile assets [skip ci]"
          git push
