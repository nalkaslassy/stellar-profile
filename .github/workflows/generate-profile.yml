name: Generate stellar-profile

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'generator/**'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate SVGs
        # Uses demo data by default. Once you have created your config.yml,
        # remove --demo and set GITHUB_TOKEN in your repo secrets.
        run: python -m generator.main --demo

      - name: Commit and push assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/
          git diff --staged --quiet || git commit -m "chore: regenerate profile assets [skip ci]"
          git push
